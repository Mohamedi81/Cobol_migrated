spring:
  application:
    name: policy-service
  datasource:
    url: jdbc:postgresql://localhost:5432/genapp
    username: genapp
    password: genapp
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
